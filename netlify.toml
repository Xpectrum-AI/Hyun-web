[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm run dev -- --port 5173"
  port = 8888
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/voice/*"
  to = "/.netlify/functions/voice-integration/:splat"
  status = 200

# Chat proxy is handled by the edge function (netlify/edge-functions/chat-proxy.js)
# which supports SSE streaming. The edge function config is declared in the file itself.

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health-check"
  status = 200

[[redirects]]
  from = "/debug-voice"
  to = "/.netlify/functions/debug-voice"
  status = 200

[[redirects]]
  from = "/test-voice"
  to = "/.netlify/functions/test-voice"
  status = 200

# SPA fallback - must be last redirect rule
# Routes all non-API requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
